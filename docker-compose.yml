# Full stack for a single VPS:  docker compose up -d --build
#
#   caddy  -> public entrypoint on :80 / :443, automatic HTTPS, routes the
#             domain (and any demo subdomains) to the right service.
#   api    -> Go binary: serves the built SPA + REST API + uploaded files.
#   db     -> PostgreSQL (internal only).
#
# Set DOMAIN, secrets, etc. in .env (see .env.example).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Empty = the SPA calls the API with relative URLs, so it works at
        # whatever domain serves it (no rebuild needed if the domain changes).
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8090
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://${DOMAIN}
      UPLOAD_DIR: /data/uploads
      PUBLIC_BASE_URL: https://${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    volumes:
      - uploads:/data/uploads
    # No host port published — only Caddy talks to the api (over the internal
    # docker network). Expose it locally with: ports: ["8090:8090"] if needed.
    expose:
      - "8090"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
